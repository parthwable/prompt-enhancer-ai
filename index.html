<!DOCTYPE html>
<html>
<head>
  <title>AI Prompt Enhancer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    textarea {
      width: 80%;
      height: 100px;
      margin: 10px;
    }

    select {
      padding: 8px;
      margin: 5px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      cursor: pointer;
    }

    #output {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<h1>AI Prompt Enhancer</h1>

<textarea id="input" placeholder="Enter your prompt..."></textarea>

<br>

<select id="category">
  <option>General</option>
  <option>Story</option>
  <option>YouTube</option>
  <option>Study</option>
</select>

<select id="tone">
  <option>Professional</option>
  <option>Creative</option>
  <option>Motivational</option>
</select>

<br>

<button onclick="enhance()">Enhance Prompt</button>

<div id="output">Your enhanced prompt will appear here...</div>

<br>

<button onclick="copyText()">Copy</button>

<script>
async function enhance() {
  const input = document.getElementById("input").value;
  const category = document.getElementById("category").value;
  const tone = document.getElementById("tone").value;

  document.getElementById("output").innerText = "Enhancing...";

  const response = await fetch(
    "https://api-inference.huggingface.co/models/google/flan-t5-large",
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer 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",
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        inputs: `Convert this into a detailed AI prompt.
Category: ${category}
Tone: ${tone}
User Input: ${input}`
      })
    }
  );

  const data = await response.json();

  if (data[0]?.generated_text) {
    document.getElementById("output").innerText = data[0].generated_text;
  } else {
    document.getElementById("output").innerText = "Error generating response.";
  }
}

function copyText() {
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
